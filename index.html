<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Typing Drill Generator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <h1>Custom Typing Drill Generator</h1>

  <!-- Row Selection Masters -->
  <section class="section row-selectors">
    <label><input type="checkbox" class="row-master" data-row="num"> Number Row</label>
    <label><input type="checkbox" class="row-master" data-row="top"> Top Row</label>
    <label><input type="checkbox" class="row-master" data-row="home" checked> Home Row</label>
    <label><input type="checkbox" class="row-master" data-row="bottom"> Bottom Row</label>
  </section>

  <!-- Visual Interactive Keyboard -->
  <section class="section keyboard" id="keyboard-container">
    <div class="kb-row">
      <label class="key-label">1<input type="checkbox" class="key num-row" value="1"></label>
      <label class="key-label">2<input type="checkbox" class="key num-row" value="2"></label>
      <label class="key-label">3<input type="checkbox" class="key num-row" value="3"></label>
      <label class="key-label">4<input type="checkbox" class="key num-row" value="4"></label>
      <label class="key-label">5<input type="checkbox" class="key num-row" value="5"></label>
      <label class="key-label">6<input type="checkbox" class="key num-row" value="6"></label>
      <label class="key-label">7<input type="checkbox" class="key num-row" value="7"></label>
      <label class="key-label">8<input type="checkbox" class="key num-row" value="8"></label>
      <label class="key-label">9<input type="checkbox" class="key num-row" value="9"></label>
      <label class="key-label">0<input type="checkbox" class="key num-row" value="0"></label>
    </div>
    <div class="kb-row">
      <label class="key-label">Q<input type="checkbox" class="key top-row" value="q"></label>
      <label class="key-label">W<input type="checkbox" class="key top-row" value="w"></label>
      <label class="key-label">E<input type="checkbox" class="key top-row" value="e"></label>
      <label class="key-label">R<input type="checkbox" class="key top-row" value="r"></label>
      <label class="key-label">T<input type="checkbox" class="key top-row" value="t"></label>
      <label class="key-label">Y<input type="checkbox" class="key top-row" value="y"></label>
      <label class="key-label">U<input type="checkbox" class="key top-row" value="u"></label>
      <label class="key-label">I<input type="checkbox" class="key top-row" value="i"></label>
      <label class="key-label">O<input type="checkbox" class="key top-row" value="o"></label>
      <label class="key-label">P<input type="checkbox" class="key top-row" value="p"></label>
    </div>
    <div class="kb-row">
      <label class="key-label">A<input type="checkbox" class="key home-row" value="a" checked></label>
      <label class="key-label">S<input type="checkbox" class="key home-row" value="s" checked></label>
      <label class="key-label">D<input type="checkbox" class="key home-row" value="d" checked></label>
      <label class="key-label">F<input type="checkbox" class="key home-row" value="f" checked></label>
      <label class="key-label">G<input type="checkbox" class="key home-row" value="g" checked></label>
      <label class="key-label">H<input type="checkbox" class="key home-row" value="h" checked></label>
      <label class="key-label">J<input type="checkbox" class="key home-row" value="j" checked></label>
      <label class="key-label">K<input type="checkbox" class="key home-row" value="k" checked></label>
      <label class="key-label">L<input type="checkbox" class="key home-row" value="l" checked></label>
      <label class="key-label">;<input type="checkbox" class="key home-row" value=";" checked></label>
    </div>
    <div class="kb-row">
      <label class="key-label">Z<input type="checkbox" class="key bottom-row" value="z"></label>
      <label class="key-label">X<input type="checkbox" class="key bottom-row" value="x"></label>
      <label class="key-label">C<input type="checkbox" class="key bottom-row" value="c"></label>
      <label class="key-label">V<input type="checkbox" class="key bottom-row" value="v"></label>
      <label class="key-label">B<input type="checkbox" class="key bottom-row" value="b"></label>
      <label class="key-label">N<input type="checkbox" class="key bottom-row" value="n"></label>
      <label class="key-label">M<input type="checkbox" class="key bottom-row" value="m"></label>
      <label class="key-label">,<input type="checkbox" class="key bottom-row" value=","></label>
      <label class="key-label">.<input type="checkbox" class="key bottom-row" value="."></label>
    </div>
  </section>

  <!-- Controls & Output -->
  <section class="section">
    <div class="controls">
      <div class="select-wrapper">
        <label for="mode">Mode:</label>
        <select id="mode">
          <option value="realWords">Real Words (Strict)</option>
          <option value="fakeWords">Fake Words (Trigrams)</option>
          <option value="weighted">Weighted Overload</option>
        </select>
      </div>

      <div class="density-control">
        <label>Words:</label>
        <input type="text" id="density" value="40" inputmode="numeric">
      </div>

      <div class="toggles">
        <label class="toggle-switch">
          <input type="checkbox" id="same-finger">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Stretch
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="include-symbols">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Symbols
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="glue-words" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Glue
        </label>
      </div>

      <button id="generate-btn">Generate Text</button>
    </div>

    <textarea id="output" readonly placeholder="Your custom drill text will appear here..."></textarea>

    <div class="actions">
      <span id="toast" class="toast">Copied to clipboard!</span>
      <button id="copy-btn">Copy Text</button>
    </div>
  </section>

  <script type="module" src="js/app.js"></script>
</body>
</html>
