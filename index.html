<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Typing Drill Generator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <h1>Custom Typing Drill Generator</h1>

  <!-- Row Selection Masters -->
  <section class="section row-selectors">
    <label><input type="checkbox" id="master-num"> Number Row</label>
    <label><input type="checkbox" id="master-top"> Top Row</label>
    <label><input type="checkbox" id="master-home" checked> Home Row</label>
    <label><input type="checkbox" id="master-bottom"> Bottom Row</label>
  </section>

  <!-- Visual Interactive Keyboard -->
  <section class="section keyboard" id="keyboard-container">
    <div class="kb-row">
      <span class="key num-row" data-key="1">1</span>
      <span class="key num-row" data-key="2">2</span>
      <span class="key num-row" data-key="3">3</span>
      <span class="key num-row" data-key="4">4</span>
      <span class="key num-row" data-key="5">5</span>
      <span class="key num-row" data-key="6">6</span>
      <span class="key num-row" data-key="7">7</span>
      <span class="key num-row" data-key="8">8</span>
      <span class="key num-row" data-key="9">9</span>
      <span class="key num-row" data-key="0">0</span>
    </div>
    <div class="kb-row">
      <span class="key top-row" data-key="q">Q</span>
      <span class="key top-row" data-key="w">W</span>
      <span class="key top-row" data-key="e">E</span>
      <span class="key top-row" data-key="r">R</span>
      <span class="key top-row" data-key="t">T</span>
      <span class="key top-row" data-key="y">Y</span>
      <span class="key top-row" data-key="u">U</span>
      <span class="key top-row" data-key="i">I</span>
      <span class="key top-row" data-key="o">O</span>
      <span class="key top-row" data-key="p">P</span>
    </div>
    <div class="kb-row">
      <span class="key home-row" data-key="a">A</span>
      <span class="key home-row" data-key="s">S</span>
      <span class="key home-row" data-key="d">D</span>
      <span class="key home-row" data-key="f">F</span>
      <span class="key home-row" data-key="g">G</span>
      <span class="key home-row" data-key="h">H</span>
      <span class="key home-row" data-key="j">J</span>
      <span class="key home-row" data-key="k">K</span>
      <span class="key home-row" data-key="l">L</span>
      <span class="key home-row" data-key=";">;</span>
    </div>
    <div class="kb-row">
      <span class="key bottom-row" data-key="z">Z</span>
      <span class="key bottom-row" data-key="x">X</span>
      <span class="key bottom-row" data-key="c">C</span>
      <span class="key bottom-row" data-key="v">V</span>
      <span class="key bottom-row" data-key="b">B</span>
      <span class="key bottom-row" data-key="n">N</span>
      <span class="key bottom-row" data-key="m">M</span>
      <span class="key bottom-row" data-key=",">,</span>
      <span class="key bottom-row" data-key=".">.</span>
    </div>
  </section>

  <!-- Controls & Output -->
  <section class="section">
    <div class="controls">
      <div class="select-wrapper">
        <label for="mode">Mode:</label>
        <select id="mode">
          <option value="realWords">Real Words (Strict)</option>
          <option value="fakeWords">Fake Words (Trigrams)</option>
          <option value="weighted">Weighted Overload</option>
        </select>
      </div>

      <div class="density-control">
        <label for="density">Words:</label>
        <input type="range" id="density" value="40" min="10" max="200">
        <span id="density-value">40</span>
      </div>

      <div class="toggles">
        <label class="toggle-switch">
          <input type="checkbox" id="same-finger">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Stretch
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="include-symbols">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Symbols
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="glue-words" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Glue
        </label>
      </div>

      <button id="generate-btn">Generate Text</button>
    </div>

    <textarea id="output" readonly placeholder="Your custom drill text will appear here..."></textarea>

    <div class="actions">
      <span id="toast" class="toast">Copied to clipboard!</span>
      <button id="copy-btn">Copy Text</button>
    </div>
  </section>

  <script type="module" src="js/app.js"></script>
</body>
</html>
